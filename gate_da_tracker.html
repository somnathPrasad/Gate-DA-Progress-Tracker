<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE DA Syllabus Tracker</title>
<style>
  :root{
    --bg:#ffffff;
    --panel:#f6f8fa;
    --panel2:#eef1f4;
    --border:#d0d7de;
    --text:#1f2328;
    --text-dim:#59636e;
    --accent:#0969da;
    --danger:#cf222e;
    --g0:#ebedf0;
    --g1:#9be9a8;
    --g2:#40c463;
    --g3:#30a14e;
    --g4:#216e39;
  }
  body.theme-dark{
    --bg:#0d1117;
    --panel:#161b22;
    --panel2:#1c2128;
    --border:#30363d;
    --text:#e6edf3;
    --text-dim:#8b949e;
    --accent:#58a6ff;
    --danger:#f85149;
    --g0:#161b22;
    --g1:#0e4429;
    --g2:#006d32;
    --g3:#26a641;
    --g4:#39d353;
  }
  body{transition:background .15s ease, color .15s ease;}
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:24px;
  }
  h1{
    font-size:22px;
    margin:0 0 4px 0;
  }
  .subtitle{
    color:var(--text-dim);
    font-size:13px;
    margin-bottom:20px;
  }
  .top-stats{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:24px;
  }
  .stat-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:14px 18px;
    min-width:140px;
  }
  .stat-card .num{
    font-size:24px;
    font-weight:600;
  }
  .stat-card .label{
    font-size:12px;
    color:var(--text-dim);
    margin-top:2px;
  }
  .tabs{
    display:flex;
    gap:4px;
    border-bottom:1px solid var(--border);
    margin-bottom:20px;
  }
  .tab-btn{
    background:none;
    border:none;
    color:var(--text-dim);
    padding:10px 16px;
    cursor:pointer;
    font-size:14px;
    border-bottom:2px solid transparent;
  }
  .tab-btn.active{
    color:var(--text);
    border-bottom:2px solid var(--accent);
  }
  .view{display:none;}
  .view.active{display:block;}

  .subject-block{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    margin-bottom:16px;
    overflow:hidden;
  }
  .subject-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    cursor:pointer;
    user-select:none;
  }
  .subject-header:hover{background:var(--panel2);}
  .subject-title{
    font-size:15px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .chevron{
    transition:transform .15s ease;
    color:var(--text-dim);
    font-size:12px;
  }
  .subject-header.collapsed .chevron{transform:rotate(-90deg);}
  .subject-meta{
    display:flex;
    align-items:center;
    gap:14px;
    font-size:12px;
    color:var(--text-dim);
  }
  .subject-progress-bar{
    width:140px;
    height:8px;
    background:var(--g0);
    border-radius:4px;
    overflow:hidden;
    border:1px solid var(--border);
  }
  .subject-progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--g1),var(--g4));
  }
  .topics{
    padding:6px 18px 16px 18px;
  }
  .topics.hidden{display:none;}
  .topic-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 0;
    border-top:1px solid var(--border);
    gap:12px;
  }
  .topic-row:first-child{border-top:none;}
  .topic-name{
    font-size:13.5px;
    flex:1;
  }
  .topic-controls{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .topic-cell{
    width:22px;
    height:22px;
    border-radius:5px;
    border:1px solid var(--border);
    background:var(--g0);
  }
  .topic-count{
    font-size:12px;
    color:var(--text-dim);
    min-width:18px;
    text-align:center;
  }
  .btn{
    border:1px solid var(--border);
    background:var(--panel2);
    color:var(--text);
    border-radius:6px;
    width:28px;
    height:28px;
    cursor:pointer;
    font-size:15px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .btn:hover{border-color:var(--accent);}
  .btn.minus{color:var(--danger);}
  .btn.reset{
    width:auto;
    padding:0 8px;
    font-size:11px;
    color:var(--text-dim);
  }

  /* Heatmap views */
  .legend{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:14px;
  }
  .legend .cell{width:14px;height:14px;border-radius:3px;border:1px solid var(--border);}

  .subject-heatmap-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;
    margin-bottom:30px;
  }
  .sh-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:14px;
  }
  .sh-card .name{font-size:13px;font-weight:600;margin-bottom:8px;}
  .sh-card .swatch{
    width:100%;
    height:50px;
    border-radius:6px;
    margin-bottom:8px;
    border:1px solid var(--border);
  }
  .sh-card .pct{font-size:12px;color:var(--text-dim);}

  .topic-heatmap-section{margin-bottom:28px;}
  .topic-heatmap-section h3{
    font-size:14px;
    margin:0 0 10px 0;
    color:var(--text-dim);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  .topic-heatmap-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(34px,1fr));
    gap:5px;
  }
  .th-cell{
    width:100%;
    aspect-ratio:1/1;
    border-radius:4px;
    border:1px solid var(--border);
    cursor:default;
    position:relative;
  }
  .th-cell:hover::after{
    content:attr(data-tip);
    position:absolute;
    bottom:120%;
    left:50%;
    transform:translateX(-50%);
    background:#000;
    color:#fff;
    padding:5px 8px;
    border-radius:5px;
    font-size:11px;
    white-space:nowrap;
    z-index:10;
    border:1px solid var(--border);
  }

  .footer-actions{
    margin-top:30px;
    display:flex;
    gap:10px;
    border-top:1px solid var(--border);
    padding-top:18px;
  }
  .footer-actions button{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text-dim);
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
  }
  .footer-actions button:hover{color:var(--text);border-color:var(--accent);}
</style>
</head>
<body>

<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">
  <div>
    <h1>GATE DA Syllabus Tracker</h1>
    <div class="subtitle">Honest self-tracking of revisions across the GATE Data Science & AI syllabus. Stored locally in this browser only — nothing is sent anywhere.</div>
  </div>
  <button id="themeToggle" class="btn" style="width:auto;padding:8px 14px;font-size:13px;white-space:nowrap;">🌙 Dark mode</button>
</div>

<div class="top-stats" id="topStats"></div>

<div class="tabs">
  <button class="tab-btn active" data-view="overview">Overview</button>
  <button class="tab-btn" data-view="subjectHeat">Heatmap — Subjects</button>
  <button class="tab-btn" data-view="topicHeat">Heatmap — Topics</button>
</div>

<div class="view active" id="view-overview"></div>
<div class="view" id="view-subjectHeat"></div>
<div class="view" id="view-topicHeat"></div>

<div class="footer-actions">
  <button id="exportBtn">Export progress (.json)</button>
  <button id="importBtn">Import progress</button>
  <input type="file" id="importFile" accept=".json" style="display:none;">
  <button id="resetAllBtn">Reset everything</button>
</div>

<script>
/* ============ SYLLABUS DATA ============ */
const SYLLABUS = {
  "Probability and Statistics": [
    "Counting (permutations and combinations)",
    "Probability axioms",
    "Sample space, events",
    "Independent events",
    "Mutually exclusive events",
    "Marginal, conditional and joint probability",
    "Bayes Theorem",
    "Conditional expectation and variance",
    "Mean, median, mode, standard deviation",
    "Correlation and covariance",
    "Random variables",
    "Discrete RVs and probability mass functions",
    "Uniform distribution (discrete)",
    "Bernoulli distribution",
    "Binomial distribution",
    "Continuous RVs and probability distribution function",
    "Uniform distribution (continuous)",
    "Exponential distribution",
    "Poisson distribution",
    "Normal distribution",
    "Standard normal distribution",
    "t-distribution",
    "Chi-squared distribution",
    "Cumulative distribution function",
    "Conditional PDF",
    "Central limit theorem",
    "Confidence interval",
    "z-test",
    "t-test",
    "Chi-squared test"
  ],
  "Linear Algebra": [
    "Vector space",
    "Subspaces",
    "Linear dependence and independence of vectors",
    "Matrices (basics)",
    "Projection matrix",
    "Orthogonal matrix",
    "Idempotent matrix",
    "Partition matrix and properties",
    "Quadratic forms",
    "Systems of linear equations and solutions",
    "Gaussian elimination",
    "Eigenvalues and eigenvectors",
    "Determinant",
    "Rank",
    "Nullity",
    "Projections",
    "LU decomposition",
    "Singular value decomposition (SVD)"
  ],
  "Calculus and Optimization": [
    "Functions of a single variable",
    "Limit",
    "Continuity and differentiability",
    "Taylor series",
    "Maxima and minima",
    "Optimization involving a single variable"
  ],
  "Programming, Data Structures and Algorithms": [
    "Programming in Python",
    "Stacks",
    "Queues",
    "Linked lists",
    "Trees",
    "Hash tables",
    "Linear search",
    "Binary search",
    "Selection sort",
    "Bubble sort",
    "Insertion sort",
    "Mergesort (divide and conquer)",
    "Quicksort (divide and conquer)",
    "Introduction to graph theory",
    "Graph traversals",
    "Shortest path algorithms"
  ],
  "Database Management and Warehousing": [
    "ER-model",
    "Relational model: relational algebra",
    "Tuple calculus",
    "SQL",
    "Integrity constraints",
    "Normal form",
    "File organization",
    "Indexing",
    "Data types",
    "Normalization (data transformation)",
    "Discretization",
    "Sampling",
    "Compression",
    "Data warehouse modelling",
    "Schema for multidimensional data models",
    "Concept hierarchies",
    "Measures: categorization and computations"
  ],
  "Machine Learning — Supervised": [
    "Regression and classification problems",
    "Simple linear regression",
    "Multiple linear regression",
    "Ridge regression",
    "Logistic regression",
    "k-nearest neighbour",
    "Naive Bayes classifier",
    "Linear discriminant analysis",
    "Support vector machine",
    "Decision trees",
    "Bias-variance trade-off",
    "Leave-one-out (LOO) cross-validation",
    "k-folds cross-validation",
    "Multi-layer perceptron",
    "Feed-forward neural network"
  ],
  "Machine Learning — Unsupervised": [
    "Clustering algorithms (overview)",
    "k-means / k-medoid",
    "Hierarchical clustering — top-down",
    "Hierarchical clustering — bottom-up (single-linkage)",
    "Hierarchical clustering — bottom-up (multiple-linkage)",
    "Dimensionality reduction",
    "Principal component analysis (PCA)"
  ],
  "Artificial Intelligence": [
    "Search: uninformed",
    "Search: informed",
    "Search: adversarial",
    "Logic: propositional",
    "Logic: predicate",
    "Reasoning under uncertainty: conditional independence representation",
    "Exact inference through variable elimination",
    "Approximate inference through sampling"
  ]
};

const STORAGE_KEY = "gate_da_tracker_v1";
const MAX_LEVEL_COUNT = 10; // count at which a topic hits darkest green

/* ============ STATE ============ */
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {};
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState(); // { "Subject||Topic": count }

function keyFor(subject, topic){ return subject + "||" + topic; }
function getCount(subject, topic){ return state[keyFor(subject,topic)] || 0; }
function setCount(subject, topic, val){
  if(val < 0) val = 0;
  state[keyFor(subject,topic)] = val;
  saveState();
}

/* color scale: 0 -> g0, 1 -> g1, up to MAX -> g4 */
function colorForCount(count){
  if(count <= 0) return "var(--g0)";
  const ratio = Math.min(count / MAX_LEVEL_COUNT, 1);
  if(ratio <= 0.01) return "var(--g0)";
  if(ratio < 0.25) return "var(--g1)";
  if(ratio < 0.5) return "var(--g2)";
  if(ratio < 0.75) return "var(--g3)";
  return "var(--g4)";
}

/* ============ COLLAPSED STATE ============ */
let collapsedSubjects;
const savedCollapsed = localStorage.getItem(STORAGE_KEY+"_collapsed");
if(savedCollapsed){
  collapsedSubjects = JSON.parse(savedCollapsed);
}else{
  collapsedSubjects = {};
  for(const subject in SYLLABUS){ collapsedSubjects[subject] = true; }
}
function saveCollapsed(){
  localStorage.setItem(STORAGE_KEY+"_collapsed", JSON.stringify(collapsedSubjects));
}

/* ============ RENDER: TOP STATS ============ */
function renderTopStats(){
  const el = document.getElementById("topStats");
  let totalTopics = 0, touchedTopics = 0, totalRevisions = 0;
  for(const subject in SYLLABUS){
    SYLLABUS[subject].forEach(topic=>{
      totalTopics++;
      const c = getCount(subject, topic);
      if(c>0) touchedTopics++;
      totalRevisions += c;
    });
  }
  const coveragePct = totalTopics ? Math.round((touchedTopics/totalTopics)*100) : 0;
  el.innerHTML = `
    <div class="stat-card"><div class="num">${touchedTopics}/${totalTopics}</div><div class="label">Topics touched at least once</div></div>
    <div class="stat-card"><div class="num">${coveragePct}%</div><div class="label">Coverage</div></div>
    <div class="stat-card"><div class="num">${totalRevisions}</div><div class="label">Total revisions logged</div></div>
  `;
}

/* ============ RENDER: OVERVIEW ============ */
function renderOverview(){
  const container = document.getElementById("view-overview");
  container.innerHTML = "";
  for(const subject in SYLLABUS){
    const topics = SYLLABUS[subject];
    const touched = topics.filter(t=>getCount(subject,t)>0).length;
    const pct = Math.round((touched/topics.length)*100);

    const block = document.createElement("div");
    block.className = "subject-block";

    const isCollapsed = !!collapsedSubjects[subject];

    block.innerHTML = `
      <div class="subject-header ${isCollapsed?'collapsed':''}" data-subject="${subject}">
        <div class="subject-title"><span class="chevron">▾</span>${subject}</div>
        <div class="subject-meta">
          <span>${touched}/${topics.length} topics</span>
          <div class="subject-progress-bar"><div class="subject-progress-fill" style="width:${pct}%"></div></div>
          <span>${pct}%</span>
        </div>
      </div>
      <div class="topics ${isCollapsed?'hidden':''}" data-subject-topics="${subject}"></div>
    `;

    const topicsEl = block.querySelector(`[data-subject-topics]`);
    topics.forEach(topic=>{
      const count = getCount(subject, topic);
      const row = document.createElement("div");
      row.className = "topic-row";
      row.innerHTML = `
        <div class="topic-cell" style="background:${colorForCount(count)}" title="${count} revision(s)"></div>
        <div class="topic-name">${topic}</div>
        <div class="topic-controls">
          <span class="topic-count">${count}</span>
          <button class="btn minus" data-action="minus" data-subject="${subject}" data-topic="${topic}">−</button>
          <button class="btn plus" data-action="plus" data-subject="${subject}" data-topic="${topic}">+1</button>
          <button class="btn reset" data-action="reset" data-subject="${subject}" data-topic="${topic}">reset</button>
        </div>
      `;
      topicsEl.appendChild(row);
    });

    container.appendChild(block);
  }

  // header collapse toggle
  container.querySelectorAll(".subject-header").forEach(h=>{
    h.addEventListener("click", ()=>{
      const subject = h.getAttribute("data-subject");
      collapsedSubjects[subject] = !collapsedSubjects[subject];
      saveCollapsed();
      renderOverview();
    });
  });

  // +1 / - / reset buttons
  container.querySelectorAll("button[data-action]").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      const subject = btn.getAttribute("data-subject");
      const topic = btn.getAttribute("data-topic");
      const action = btn.getAttribute("data-action");
      const current = getCount(subject, topic);
      if(action === "plus") setCount(subject, topic, current+1);
      else if(action === "minus") setCount(subject, topic, current-1);
      else if(action === "reset") setCount(subject, topic, 0);
      renderAll();
    });
  });
}

/* ============ RENDER: SUBJECT HEATMAP ============ */
function renderSubjectHeatmap(){
  const container = document.getElementById("view-subjectHeat");
  container.innerHTML = `
    <div class="legend">
      <span>Less</span>
      <span class="cell" style="background:var(--g0)"></span>
      <span class="cell" style="background:var(--g1)"></span>
      <span class="cell" style="background:var(--g2)"></span>
      <span class="cell" style="background:var(--g3)"></span>
      <span class="cell" style="background:var(--g4)"></span>
      <span>More</span>
      <span style="margin-left:10px;">Color = average revisions per topic in the subject</span>
    </div>
    <div class="subject-heatmap-grid" id="shGrid"></div>
  `;
  const grid = document.getElementById("shGrid");
  for(const subject in SYLLABUS){
    const topics = SYLLABUS[subject];
    const counts = topics.map(t=>getCount(subject,t));
    const avg = counts.reduce((a,b)=>a+b,0)/topics.length;
    const touched = counts.filter(c=>c>0).length;
    const pct = Math.round((touched/topics.length)*100);
    const card = document.createElement("div");
    card.className = "sh-card";
    card.innerHTML = `
      <div class="name">${subject}</div>
      <div class="swatch" style="background:${colorForCount(avg)}"></div>
      <div class="pct">${pct}% covered · avg ${avg.toFixed(1)} revisions/topic</div>
    `;
    grid.appendChild(card);
  }
}

/* ============ RENDER: TOPIC HEATMAP ============ */
function renderTopicHeatmap(){
  const container = document.getElementById("view-topicHeat");
  container.innerHTML = `
    <div class="legend">
      <span>Less</span>
      <span class="cell" style="background:var(--g0)"></span>
      <span class="cell" style="background:var(--g1)"></span>
      <span class="cell" style="background:var(--g2)"></span>
      <span class="cell" style="background:var(--g3)"></span>
      <span class="cell" style="background:var(--g4)"></span>
      <span>More</span>
      <span style="margin-left:10px;">Each cell = one topic. Hover for details.</span>
    </div>
  `;
  for(const subject in SYLLABUS){
    const section = document.createElement("div");
    section.className = "topic-heatmap-section";
    section.innerHTML = `<h3>${subject}</h3><div class="topic-heatmap-grid"></div>`;
    const grid = section.querySelector(".topic-heatmap-grid");
    SYLLABUS[subject].forEach(topic=>{
      const count = getCount(subject, topic);
      const cell = document.createElement("div");
      cell.className = "th-cell";
      cell.style.background = colorForCount(count);
      cell.setAttribute("data-tip", `${topic} — ${count} revision(s)`);
      grid.appendChild(cell);
    });
    container.appendChild(section);
  }
}

/* ============ RENDER ALL ============ */
function renderAll(){
  renderTopStats();
  renderOverview();
  renderSubjectHeatmap();
  renderTopicHeatmap();
}

/* ============ TABS ============ */
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("view-"+btn.getAttribute("data-view")).classList.add("active");
  });
});

/* ============ EXPORT / IMPORT / RESET ============ */
document.getElementById("exportBtn").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `gate_da_progress_${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("importBtn").addEventListener("click", ()=>{
  document.getElementById("importFile").click();
});
document.getElementById("importFile").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const imported = JSON.parse(ev.target.result);
      if(confirm("Import this progress file? This will overwrite your current local progress.")){
        state = imported;
        saveState();
        renderAll();
      }
    }catch(err){
      alert("Could not read that file as valid progress JSON.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

document.getElementById("resetAllBtn").addEventListener("click", ()=>{
  if(confirm("This will erase ALL logged revisions for every topic. This cannot be undone unless you've exported a backup. Continue?")){
    state = {};
    saveState();
    renderAll();
  }
});

/* ============ THEME ============ */
const THEME_KEY = STORAGE_KEY + "_theme";
function applyTheme(theme){
  const btn = document.getElementById("themeToggle");
  if(theme === "dark"){
    document.body.classList.add("theme-dark");
    btn.textContent = "☀️ Light mode";
  }else{
    document.body.classList.remove("theme-dark");
    btn.textContent = "🌙 Dark mode";
  }
  localStorage.setItem(THEME_KEY, theme);
}
document.getElementById("themeToggle").addEventListener("click", ()=>{
  const isDark = document.body.classList.contains("theme-dark");
  applyTheme(isDark ? "light" : "dark");
});
applyTheme(localStorage.getItem(THEME_KEY) || "light");

/* ============ INIT ============ */
renderAll();
</script>

</body>
</html>
